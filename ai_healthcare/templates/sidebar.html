<style>
    /* Sidebar Styling */
    .sidebar {
        position: fixed;
        height: 100vh;
        width: 240px;
        background: linear-gradient(180deg, #3a7bd5, #00d2ff);
        padding-top: 20px;
        color: white;
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        transition: all 0.3s ease;
    }

    .sidebar h3 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
        font-size: 20px;
    }

    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar-item {
        margin: 0;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        color: white;
        text-decoration: none;
        /* This transition creates the smooth visual effect */
        transition: all 0.3s ease; 
        border-left: 4px solid transparent;
    }

    .sidebar a:hover {
        background: rgba(255, 255, 255, 0.2);
        padding-left: 28px;
        border-left-color: white;
    }

    .sidebar a i {
        width: 20px;
        text-align: center;
    }

    .sidebar a.active {
        background: rgba(255, 255, 255, 0.3);
        border-left-color: white;
        font-weight: 600;
    }

    .sidebar-footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .sidebar-footer a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 15px;
        font-size: 14px;
    }

    /* Mobile Sidebar Toggle */
    .sidebar-toggle {
        display: none;
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 1001;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        width: 40px;
        height: 40px;
        cursor: pointer;
        font-size: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .sidebar {
            width: 100%;
            height: auto;
            position: relative;
            padding: 0;
            box-shadow: none;
        }

        .sidebar h3 {
            padding: 15px;
            margin: 0;
            text-align: left;
        }

        .sidebar a {
            padding: 12px 15px;
            font-size: 14px;
        }

        .sidebar-footer {
            position: relative;
            bottom: auto;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }
    }
</style>

<div class="sidebar">
    <h3><i class="fas fa-heart"></i> AI Healthcare</h3>

    <ul class="sidebar-menu">
        <li class="sidebar-item">
            <!-- Django checks if the current URL is 'dashboard' to make it active on load -->
            <a href="{% url 'dashboard:dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-home"></i> Dashboard
            </a>
        </li>
        <li class="sidebar-item">
            <a href="{% url 'reports:list' %}" class="sidebar-link {% if request.resolver_match.url_name == 'upload_report' %}active{% endif %}">
                <i class="fas fa-upload"></i> Upload Report
            </a>
        </li>
        <li class="sidebar-item">
            <a href="{% url "ai_engine:chat_interface" %}" class="sidebar-link">
                <i class="fas fa-robot"></i> AI Assistant
            </a>
        </li>
        <li class="sidebar-item">
            <a href="{% url "dashboard:analytics" %}" class="sidebar-link">
                <i class="fas fa-chart-line"></i> Analytics
            </a>
        </li>
        <li class="sidebar-item">
            <a href="{% url "dashboard:history" %}" class="sidebar-link">
                <i class="fas fa-history"></i> History
            </a>
        </li>
        <li class="sidebar-item">
            <a href="{% url "accounts:profile" %}" class="sidebar-link">
                <i class="fas fa-user"></i> Profile
            </a>
        </li>
        <li class="sidebar-item">
            <a href="#settings" class="sidebar-link">
                <i class="fas fa-cog"></i> Settings
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <a href="{% url 'accounts:logout' %}">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Grab all links within the sidebar menu
        const sidebarLinks = document.querySelectorAll('.sidebar-link');

        sidebarLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                // 1. Visually remove 'active' from all links smoothly
                sidebarLinks.forEach(item => item.classList.remove('active'));

                // 2. Add 'active' to the newly clicked link
                this.classList.add('active');

                // 3. Handle single-page sections (links starting with '#')
                const href = this.getAttribute('href');
                if (href && href.startsWith('#')) {
                    // Prevent the page from scrolling/jumping
                    e.preventDefault(); 
                    
                    // NOTE: If you are building a single-page app, you would add your 
                    // content switching logic here (e.g., hiding/showing divs based on the href)
                }
            });
        });
    });
</script>
