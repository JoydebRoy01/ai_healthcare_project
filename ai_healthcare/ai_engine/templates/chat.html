
{% load static %}

{% block content %}
<style>
    /* Chat Container Styles */
    .ai-chat-wrapper {
        max-width: 500px;
        margin: 50px auto;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        height: 650px;
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
    }

    /* Premium Gradient Header */
    .ai-chat-header {
        background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        color: white;
        padding: 18px 24px;
        font-weight: 600;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        z-index: 10;
    }

    /* Online Status Dot */
    .ai-chat-header::before {
        content: '';
        display: block;
        width: 10px;
        height: 10px;
        background-color: #22c55e; /* Green */
        border-radius: 50%;
        box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
    }

    /* Chat Area */
    .ai-chat-box {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: #f8fafc;
        scroll-behavior: smooth;
    }

    /* Custom Scrollbar */
    .ai-chat-box::-webkit-scrollbar {
        width: 6px;
    }
    .ai-chat-box::-webkit-scrollbar-track {
        background: transparent;
    }
    .ai-chat-box::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }

    /* Message Bubbles */
    .chat-message {
        max-width: 80%;
        padding: 14px 18px;
        font-size: 0.95rem;
        line-height: 1.5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.04);
        animation: messageSlideIn 0.3s ease-out forwards;
        opacity: 0;
        transform: translateY(10px);
    }

    @keyframes messageSlideIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message-user {
        background: #1e3a8a;
        color: white;
        align-self: flex-end;
        border-radius: 20px 20px 4px 20px; /* Tail on bottom right */
    }

    .message-ai {
        background: #ffffff;
        color: #1e293b;
        border: 1px solid #e2e8f0;
        align-self: flex-start;
        border-radius: 20px 20px 20px 4px; /* Tail on bottom left */
    }

    /* Input Area */
    .ai-chat-input-area {
        display: flex;
        padding: 16px 20px;
        background: #ffffff;
        border-top: 1px solid #f1f5f9;
        align-items: center;
        gap: 12px;
    }

    .ai-chat-input-area input {
        flex: 1;
        padding: 14px 20px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        border-radius: 50px; /* Pill shape */
        outline: none;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .ai-chat-input-area input:focus {
        border-color: #3b82f6;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* Icon Send Button */
    .ai-chat-input-area button {
        background: #1e3a8a;
        color: white;
        border: none;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(30, 58, 138, 0.2);
    }

    .ai-chat-input-area button:hover {
        background: #172554;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(30, 58, 138, 0.3);
    }

    .ai-chat-input-area button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    /* SVG Send Icon */
    .ai-chat-input-area button svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
        margin-left: 2px; /* Visual center adjustment */
    }

    /* Animated Typing Indicator */
    .typing-indicator {
        align-self: flex-start;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 20px 20px 20px 4px;
        padding: 14px 18px;
        display: none;
        gap: 6px;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.04);
        margin-bottom: 10px;
    }

    .typing-indicator .dot {
        width: 8px;
        height: 8px;
        background: #94a3b8;
        border-radius: 50%;
        animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typingBounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
    }
</style>

<div class="ai-chat-wrapper">
    <div class="ai-chat-header">Health Assistant AI</div>
    
    <div class="ai-chat-box" id="chatBox">
        <div class="chat-message message-ai">Hello! I am your AI Health Assistant. How can I help you today?</div>
        <div class="typing-indicator" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="ai-chat-input-area">
        {% csrf_token %}
        <input type="text" id="userInput" placeholder="Ask a health question..." autocomplete="off">
        <button id="sendBtn" aria-label="Send Message">
            <svg viewBox="0 0 24 24">
                <path d="M3.4 20.4l17.45-7.48c.81-.35.81-1.49 0-1.84L3.4 3.6c-.66-.29-1.39.2-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.06-.87.48-.87.99l.01 4.61c0 .71.73 1.2 1.39.92z"/>
            </svg>
        </button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const typingIndicator = document.getElementById("typingIndicator");

    // Extract CSRF token from the DOM
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    function appendMessage(sender, text) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("chat-message");
        msgDiv.classList.add(sender === "user" ? "message-user" : "message-ai");
        msgDiv.textContent = text;
        
        // Insert before the typing indicator so the indicator stays at the bottom
        chatBox.insertBefore(msgDiv, typingIndicator);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // 1. Show user message
        appendMessage("user", message);
        userInput.value = "";
        
        // 2. Show loading state
        typingIndicator.style.display = "flex";
        sendBtn.disabled = true;
        scrollToBottom();

        try {
            // 3. Make API call to your Django View
            const response = await fetch("{% url 'ai_engine:chat_api' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrfToken // Pass CSRF token in headers
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            if (response.ok) {
                appendMessage("ai", data.reply);
            } else {
                appendMessage("ai", "Error: " + (data.error || "Failed to get response."));
            }
        } catch (error) {
            appendMessage("ai", "Connection error. Please try again later.");
        } finally {
            // 4. Reset loading state
            typingIndicator.style.display = "none";
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // Trigger send on button click
    sendBtn.addEventListener("click", sendMessage);

    // Trigger send on Enter key
    userInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            e.preventDefault(); // Prevents accidental form submissions if wrapped in a form later
            sendMessage();
        }
    });
});
</script>
{% endblock %}
